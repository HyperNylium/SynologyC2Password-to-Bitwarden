name: Lint test

on:
  push:
    branches: [ master ]
    paths:
      - "*.py"
      - "**/*.py"
  pull_request:
    branches: [ master ]
    paths:
      - "*.py"
      - "**/*.py"

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.11'
      - run: uv run ruff check .
